name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_call:

env:
  SOLANA_VERSION: stable
  CARGO_TERM_COLOR: always

jobs:
  rust_fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Get nightly toolchain version
        id: nightly
        run: echo "version=$(make nightly-version)" >> $GITHUB_OUTPUT
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.nightly.outputs.version }}
          components: rustfmt
      - name: Run format
        run: make format

  rust_clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-
      - name: Get nightly toolchain version
        id: nightly
        run: echo "version=$(make nightly-version)" >> $GITHUB_OUTPUT
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.nightly.outputs.version }}
          components: clippy
      - name: Run clippy
        run: make clippy

  check_features:
    name: Check Features
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-hack-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-hack-
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack
      - name: Check all feature combinations
        run: make check-features

  cargo_test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Cache Solana tools
        uses: actions/cache@v5
        with:
          path: ~/.local/share/solana
          key: ${{ runner.os }}-solana-${{ env.SOLANA_VERSION }}
      - name: Install Solana tools (cargo-build-sbf)
        run: |
          if [ ! -f "$HOME/.local/share/solana/install/active_release/bin/cargo-build-sbf" ]; then
            sh -c "$(curl -sSfL https://release.anza.xyz/${{ env.SOLANA_VERSION }}/install)"
          fi
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-
      - uses: dtolnay/rust-toolchain@stable
      - name: Build SBF programs
        run: make build-sbf
      - name: Test
        run: make test

  miri:
    name: Miri (Tree Borrows)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-miri-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-miri-
      - name: Get nightly toolchain version
        id: nightly
        run: echo "version=$(make nightly-version)" >> $GITHUB_OUTPUT
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.nightly.outputs.version }}
          components: miri
      - name: Run Miri tests
        run: make test-miri

  cu_benchmark_pr:
    name: CU Benchmark (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Cache Solana tools
        uses: actions/cache@v5
        with:
          path: ~/.local/share/solana
          key: ${{ runner.os }}-solana-${{ env.SOLANA_VERSION }}
      - name: Install Solana tools
        run: |
          if [ ! -f "$HOME/.local/share/solana/install/active_release/bin/cargo-build-sbf" ]; then
            sh -c "$(curl -sSfL https://release.anza.xyz/${{ env.SOLANA_VERSION }}/install)"
          fi
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bench-
      - uses: dtolnay/rust-toolchain@stable

      # --- Base branch CU ---
      - name: Build & bench base
        run: |
          git checkout -f ${{ github.event.pull_request.base.sha }}
          cargo build-sbf --manifest-path examples/vault/Cargo.toml
          cargo test -p quasar-vault -- --nocapture 2>&1 | tee /tmp/base_output.txt
          echo "DEPOSIT_BASE=$(grep 'DEPOSIT CU:' /tmp/base_output.txt | head -1 | grep -oE '[0-9]+')" >> $GITHUB_ENV
          echo "WITHDRAW_BASE=$(grep 'WITHDRAW CU:' /tmp/base_output.txt | head -1 | grep -oE '[0-9]+')" >> $GITHUB_ENV
          BASE_BIN=$(find target -name "quasar_vault.so" -path "*/deploy/*" | head -1)
          echo "SIZE_BASE=$(wc -c < "$BASE_BIN" | tr -d ' ')" >> $GITHUB_ENV

      # --- PR head CU ---
      - name: Build & bench PR
        run: |
          git checkout -f ${{ github.event.pull_request.head.sha }}
          cargo build-sbf --manifest-path examples/vault/Cargo.toml
          cargo test -p quasar-vault -- --nocapture 2>&1 | tee /tmp/pr_output.txt
          echo "DEPOSIT_PR=$(grep 'DEPOSIT CU:' /tmp/pr_output.txt | head -1 | grep -oE '[0-9]+')" >> $GITHUB_ENV
          echo "WITHDRAW_PR=$(grep 'WITHDRAW CU:' /tmp/pr_output.txt | head -1 | grep -oE '[0-9]+')" >> $GITHUB_ENV
          PR_BIN=$(find target -name "quasar_vault.so" -path "*/deploy/*" | head -1)
          echo "SIZE_PR=$(wc -c < "$PR_BIN" | tr -d ' ')" >> $GITHUB_ENV

      # --- Post comment ---
      - name: Post CU benchmark comment
        uses: actions/github-script@v7
        with:
          script: |
            const deposit_base = parseInt(process.env.DEPOSIT_BASE) || 0;
            const deposit_pr = parseInt(process.env.DEPOSIT_PR) || 0;
            const withdraw_base = parseInt(process.env.WITHDRAW_BASE) || 0;
            const withdraw_pr = parseInt(process.env.WITHDRAW_PR) || 0;
            const size_base = parseInt(process.env.SIZE_BASE) || 0;
            const size_pr = parseInt(process.env.SIZE_PR) || 0;

            function delta(base, pr) {
              const d = pr - base;
              if (d === 0) return '0 ⚪';
              return d > 0 ? `+${d} 🔴` : `${d} 🟢`;
            }

            function fmtNum(n) {
              return n.toLocaleString('en-US');
            }

            const body = `## ⚡ CU Benchmark (Vault)

            | Instruction | Base | PR | Delta |
            |-------------|------|-----|-------|
            | Deposit | ${fmtNum(deposit_base)} | ${fmtNum(deposit_pr)} | ${delta(deposit_base, deposit_pr)} |
            | Withdraw | ${fmtNum(withdraw_base)} | ${fmtNum(withdraw_pr)} | ${delta(withdraw_base, withdraw_pr)} |

            **Binary size**: ${fmtNum(size_pr)} bytes (${delta(size_base, size_pr)} bytes)`.replace(/^            /gm, '');

            // Find and replace existing CU comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('CU Benchmark (Vault)'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  check_if_pr_commit:
    name: Detect merged PR push
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      skip_bench: ${{ steps.check_pr_commit.outputs.skip_bench }}
    steps:
      - name: Detect PR-associated push commit
        id: check_pr_commit
        uses: actions/github-script@v7
        with:
          script: |
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });

            const mergedPrs = prs.filter(pr => pr.merged_at);
            const skipBench = mergedPrs.length > 0;
            core.setOutput('skip_bench', skipBench ? 'true' : 'false');

  cu_benchmark_push:
    name: CU Benchmark (Push)
    needs: [check_if_pr_commit]
    if: github.event_name == 'push' && needs.check_if_pr_commit.outputs.skip_bench != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Cache Solana tools
        uses: actions/cache@v5
        with:
          path: ~/.local/share/solana
          key: ${{ runner.os }}-solana-${{ env.SOLANA_VERSION }}
      - name: Install Solana tools
        run: |
          if [ ! -f "$HOME/.local/share/solana/install/active_release/bin/cargo-build-sbf" ]; then
            sh -c "$(curl -sSfL https://release.anza.xyz/${{ env.SOLANA_VERSION }}/install)"
          fi
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bench-
      - uses: dtolnay/rust-toolchain@stable

      # --- Push baseline CU (pre-push branch HEAD) ---
      - name: Build & bench push base
        run: |
          # Use pre-push HEAD as baseline for push event comparisons.
          BASE_SHA="${{ github.event.before }}"

          if [ -z "$BASE_SHA" ] \
            || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ] \
            || ! git rev-parse --verify -q "$BASE_SHA^{commit}" >/dev/null; then
            echo "PUSH_BASE_AVAILABLE=false" >> $GITHUB_ENV
            echo "PUSH_BASE_SHA=N/A" >> $GITHUB_ENV
            exit 0
          fi

          echo "PUSH_BASE_SHA=$BASE_SHA" >> $GITHUB_ENV
          git checkout -f "$BASE_SHA"
          cargo build-sbf --manifest-path examples/vault/Cargo.toml
          cargo test -p quasar-vault -- --nocapture 2>&1 | tee /tmp/push_base_output.txt
          BASE_BIN=$(find target -name "quasar_vault.so" -path "*/deploy/*" | head -1)
          wc -c < "$BASE_BIN" | tr -d ' ' > /tmp/push_base_size.txt
          echo "PUSH_BASE_AVAILABLE=true" >> $GITHUB_ENV

      # --- Push head CU (current commit) ---
      - name: Build & bench push head
        run: |
          git checkout -f ${{ github.sha }}
          cargo build-sbf --manifest-path examples/vault/Cargo.toml
          cargo test -p quasar-vault -- --nocapture 2>&1 | tee /tmp/push_head_output.txt
          HEAD_BIN=$(find target -name "quasar_vault.so" -path "*/deploy/*" | head -1)
          wc -c < "$HEAD_BIN" | tr -d ' ' > /tmp/push_head_size.txt

      # --- Output push report to CLI ---
      - name: Output push benchmark report
        run: |
          delta() {
            local base="$1"
            local head="$2"
            local d=$((head - base))
            if [ "$d" -eq 0 ]; then
              echo "0"
            elif [ "$d" -gt 0 ]; then
              echo "+$d"
            else
              echo "$d"
            fi
          }

          echo "CU Benchmark (Vault)"
          echo "Base commit: ${PUSH_BASE_SHA:-N/A}"
          echo "Head commit: ${{ github.sha }}"

          DEPOSIT_HEAD="$(grep 'DEPOSIT CU:' /tmp/push_head_output.txt | head -1 | grep -oE '[0-9]+' || true)"
          WITHDRAW_HEAD="$(grep 'WITHDRAW CU:' /tmp/push_head_output.txt | head -1 | grep -oE '[0-9]+' || true)"
          SIZE_HEAD="$(cat /tmp/push_head_size.txt 2>/dev/null || true)"

          if [ "$PUSH_BASE_AVAILABLE" != "true" ]; then
            echo "Baseline unavailable; showing head-only results"
            echo "Deposit CU: ${DEPOSIT_HEAD:-N/A}"
            echo "Withdraw CU: ${WITHDRAW_HEAD:-N/A}"
            echo "Binary size: ${SIZE_HEAD:-N/A} bytes"
            exit 0
          fi

          DEPOSIT_BASE="$(grep 'DEPOSIT CU:' /tmp/push_base_output.txt | head -1 | grep -oE '[0-9]+' || true)"
          WITHDRAW_BASE="$(grep 'WITHDRAW CU:' /tmp/push_base_output.txt | head -1 | grep -oE '[0-9]+' || true)"
          SIZE_BASE="$(cat /tmp/push_base_size.txt 2>/dev/null || true)"

          echo "Instruction | Base | Head | Delta"
          echo "Deposit     | ${DEPOSIT_BASE:-N/A} | ${DEPOSIT_HEAD:-N/A} | $(delta "${DEPOSIT_BASE:-0}" "${DEPOSIT_HEAD:-0}")"
          echo "Withdraw    | ${WITHDRAW_BASE:-N/A} | ${WITHDRAW_HEAD:-N/A} | $(delta "${WITHDRAW_BASE:-0}" "${WITHDRAW_HEAD:-0}")"
          echo "Binary size | ${SIZE_BASE:-N/A} | ${SIZE_HEAD:-N/A} | $(delta "${SIZE_BASE:-0}" "${SIZE_HEAD:-0}") bytes"
